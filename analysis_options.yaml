# Αυτό το αρχείο ρυθμίζει τον αναλυτή (analyzer), που ελέγχει στατικά τον κώδικα Dart
# για σφάλματα, προειδοποιήσεις και ελέγχους λογικής (lints).
#
# Τα ευρήματα εμφανίζονται στο περιβάλλον των IDE που υποστηρίζουν Dart
# (https://dart.dev/tools#ides-and-editors). Ο αναλυτής μπορεί να τρέξει και από
# γραμμή εντολών με: `flutter analyze`.

# Η ακόλουθη γραμμή ενεργοποιεί μια συλλογή συνιστώμενων κανόνων (lints) για
# εφαρμογές, πακέτα και πρόσθετα Flutter, για καλές πρακτικές κώδικα.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "Grok/**"

linter:
  # Οι κανόνες ελέγχου που ισχύουν στο project μπορούν να προσαρμοστούν πιο κάτω:
  # απενεργοποίηση κανόνων από το `package:flutter_lints/flutter.yaml` ή
  # ενεργοποίηση επιπλέον. Πλήρης λίστα: https://dart.dev/lints.
  #
  # Αντί να απενεργοποιήσετε έναν κανόνα για όλο το project, μπορείτε να τον
  # αγνοήσετε μόνο σε μια γραμμή ή σε ένα συγκεκριμένο αρχείο .dart με τη σύνταξη
  # `// ignore: name_of_lint` και `// ignore_for_file: name_of_lint` στη γραμμή
  # ή στο αρχείο που πυροδοτεί τον έλεγχο.
  rules:
    # avoid_print: false   # Ξεσχολιάστε για να απενεργοποιήσετε τον κανόνα avoid_print
    # prefer_single_quotes: true   # Ξεσχολιάστε για να ενεργοποιήσετε τον κανόνα prefer_single_quotes

# Περισσότερα: https://dart.dev/guides/language/analysis-options
